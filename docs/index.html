<script>
const CATS = window.__CATS__, NOTES = window.__NOTES__;
let active = 'all', query = '';

const esc = s => String(s ?? '');
const icon = c => `<i data-lucide="${CATS[c] ? CATS[c].icon : 'more-horizontal'}"></i>`;
const relRunes = n => {
  let out = '';
  for (let i = 1; i <= 5; i++) out += i <= n ? '<span>ᛏ</span>' : '<span class="off">ᛏ</span>';
  return out;
};

function cardHTML(n) {
  const cat = CATS[n.category] || {he: n.category, icon: 'more-horizontal'};
  const list = (t, xs) => xs.length ? `<h3>${t}</h3><ul>${xs.map(x => `<li>${x}</li>`).join('')}</ul>` : '';
  const tools = n.tools.length ? `<h3>כלים</h3><table><thead><tr>
      <th>שם</th><th>קטגוריה</th><th>קישור</th><th>מה זה עושה</th><th>מקור</th><th>אומת</th></tr></thead><tbody>` +
    n.tools.map(t => `<tr>
      <td><span class="ltr">${t.name}</span></td><td>${t.category}</td>
      <td>${t.url && t.url !== '—' ? `<a class="ltr" href="${t.url}" target="_blank" rel="noopener">${t.url}</a>` : '—'}</td>
      <td>${t.desc}</td><td>${t.source}</td><td>${t.verified}</td></tr>`).join('') + '</tbody></table>' : '';

  return `<article class="card" id="${n.id}" data-cat="${n.category}">
    <div class="meta">${icon(n.category)}<span>${cat.he}</span><span>·</span>
      <span class="ltr">${n.processed}</span><span>·</span><span>${n.creator}</span>
      <span class="rel rune" title="רלוונטיות ${n.relevance}/5">${relRunes(n.relevance)}</span></div>
    <h2>${n.title_he}</h2>
    <div class="en ltr">${n.title_en}</div>
    <div class="sum">${n.summary}</div>
    <div class="tags">${n.tags.map(t => `<span class="tag ltr">${t}</span>`).join('')}</div>
    <div class="row">
      <button class="btn toggle" aria-expanded="false">פרטים</button>
      <a class="btn ltr" href="${n.source_url}" target="_blank" rel="noopener">${n.platform}</a>
    </div>
    <div class="doc">
      ${list('תובנות מפתח', n.insights)}${tools}${list('ריפוזיטוריז', n.repos)}
      ${list('פריטי פעולה', n.actions)}${list('הערות אימות', n.verification)}
    </div>
  </article>`;
}

function render() {
  const q = query.trim().toLowerCase();
  const shown = NOTES.filter(n => {
    if (active !== 'all' && n.category !== active) return false;
    if (!q) return true;
    return JSON.stringify(n).toLowerCase().includes(q);
  });
  const grid = document.getElementById('grid');
  grid.innerHTML = shown.length
    ? shown.map(cardHTML).join('')
    : '<div class="empty">אין פתקים תואמים</div>';
  if (window.lucide) lucide.createIcons();
}

document.addEventListener('click', e => {
  const t = e.target.closest('.toggle');
  if (t) {
    const card = t.closest('.card');
    const open = card.classList.toggle('open');
    t.setAttribute('aria-expanded', String(open));
    t.textContent = open ? 'סגור' : 'פרטים';
    return;
  }
  const p = e.target.closest('.pill');
  if (p) {
    active = p.dataset.cat;
    document.querySelectorAll('.pill').forEach(x =>
      x.setAttribute('aria-pressed', String(x === p)));
    render();
  }
});

document.getElementById('q').addEventListener('input', e => { query = e.target.value; render(); });

function openHash() {
  const id = decodeURIComponent(location.hash.slice(1));
  if (!id) return;
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.add('open', 'hit');
  const btn = el.querySelector('.toggle');
  if (btn) { btn.setAttribute('aria-expanded', 'true'); btn.textContent = 'סגור'; }
  el.scrollIntoView({behavior: 'smooth', block: 'center'});
}

window.addEventListener('hashchange', () => { render(); openHash(); });
render();
openHash();
</script>
